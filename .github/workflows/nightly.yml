---
name: Nightly build CI

on:
  push:
    paths:
      - .github/workflows/nightly.yml
      - Dockerfile.client.production
      - Dockerfile.server.production
      - apps/client/**
      - apps/server/**
      - yarn.lock
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/your_spotify

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push client nightly
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.client.production
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.docker-meta.outputs.labels }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/your_spotify_client:nightly
            ghcr.io/${{ github.repository_owner }}/your_spotify_client:${{ github.sha }}

      - name: Build and push server nightly
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.server.production
          platforms: linux/amd64,linux/arm64
          push: true
          labels: ${{ steps.docker-meta.outputs.labels }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/your_spotify_server:nightly
            ghcr.io/${{ github.repository_owner }}/your_spotify_server:${{ github.sha }}
